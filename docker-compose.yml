services:
  dev:
    build:
      context: .
      target: development
    container_name: ts-collections-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npm run dev

  test:
    build:
      context: .
      target: development
    container_name: ts-collections-test
    working_dir: /app
    volumes:
      - .:/app
    command: npm test

  lint:
    build:
      context: .
      target: development
    container_name: ts-collections-lint
    working_dir: /app
    volumes:
      - .:/app
    command: npm run lint

  # Build service
  build:
    build:
      context: .
      target: build
    container_name: ts-collections-build
    working_dir: /app
    volumes:
      - .:/app
    command: npm run build

  # Production service
  prod:
    build:
      context: .
      target: production
    container_name: ts-collections-prod
    working_dir: /app
    command: node dist/index.js
